name: Fetch Foreign Player Stats

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pybaseball pandas

      - name: Fetch FanGraphs stats for foreign players
        run: python scripts/fetch_foreign_stats.py

      - name: Commit updated foreign_2026.csv
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/foreign_2026.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update foreign_2026.csv with FanGraphs stats ($(date +'%Y-%m-%d'))"
            git push
          fi
